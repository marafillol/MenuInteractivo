<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Panel Administrativo - Museo Malvinas
    </title>


    <link rel="stylesheet" href="css/login.css">


</head>


<body>


<div class="fondo">


    <!-- LOGO / ESCUDO -->

    <div class="contenedor-login">


        <div class="logo-museo">

            <img
                    src="imagenes/logo-museo.png"
                    alt="Museo Malvinas">

        </div>



        <div class="login">


            <div class="encabezado">


                <h1>
                    MENU INTERACTIVO
                </h1>


                <h2>
                    Centro de Documentación Histórica
                </h2>


                <div class="linea"></div>


                <p>
                    Panel Administrativo
                </p>


            </div>





            <form id="formLogin">



                <div class="campo">


                    <label>
                        Usuario
                    </label>


                    <input

                            type="text"

                            id="usuario"

                            placeholder="Ingrese su usuario"

                            required

                    >


                </div>






                <div class="campo">


                    <label>
                        Contraseña
                    </label>


                    <input

                            type="password"

                            id="password"

                            placeholder="Ingrese su contraseña"

                            required

                    >


                </div>





                <button type="submit">


                    Ingresar


                    <span>
                        →
                    </span>


                </button>



            </form>



            <div class="pie-login">

                Sistema de Gestión Histórica

            </div>



        </div>


    </div>


</div>





<script type="module" src="js/login.js"></script>


</body>


</html>
