<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Panel Administrativo</title>

    <link rel="stylesheet" href="css/login.css">

</head>

<body>

<div class="fondo">

    <div class="login">

        <div class="encabezado">

            <h1>MENU INTERACTIVO</h1>

            <h2>Centro de Documentación Histórica</h2>

            <p>Panel Administrativo</p>

        </div>

        <form id="formLogin">

            <label>Usuario</label>

            <input
                    type="text"
                    id="usuario"
                    placeholder="Ingrese su usuario"
                    required
            >

            <label>Contraseña</label>

            <input
                    type="password"
                    id="password"
                    placeholder="Ingrese su contraseña"
                    required
            >

            <button type="submit">

                Ingresar

            </button>

        </form>

    </div>

</div>

<script src="js/login.js"></script>

</body>

</html>
