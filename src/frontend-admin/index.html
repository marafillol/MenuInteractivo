<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Panel Administrativo - Museo Malvinas
    </title>


    <link rel="stylesheet" href="css/login.css">


</head>


<body>


<section class="login-page">


    <div class="fondo">


        <!-- =========================
             CONTENEDOR LOGIN
        ========================== -->


        <div class="contenedor-login">



            <!-- LOGO MUSEO -->


            <div class="logo-museo">


                <img
                        src="imagenes/logo-museo.png"
                        alt="Museo Malvinas">


            </div>








            <!-- TARJETA LOGIN -->


            <div class="login">



                <div class="encabezado">



                    <h1>
                        MENU INTERACTIVO
                    </h1>



                    <h2>
                        Centro de Documentación Histórica
                    </h2>



                    <div class="linea"></div>



                    <p>
                        Panel Administrativo
                    </p>



                </div>







                <form id="formLogin">





                    <div class="campo">


                        <label>
                            Usuario
                        </label>



                        <input

                                type="text"

                                id="usuario"

                                placeholder="Ingrese su usuario"

                                autocomplete="username"

                                required>


                    </div>









                    <div class="campo">


                        <label>
                            Contraseña
                        </label>



                        <input

                                type="password"

                                id="password"

                                placeholder="Ingrese su contraseña"

                                autocomplete="current-password"

                                required>


                    </div>









                    <button type="submit">


                        Ingresar


                        <span>
                            →
                        </span>


                    </button>




                </form>








                <div class="pie-login">


                    Sistema de Gestión Histórica


                </div>





            </div>




        </div>



    </div>









    <!-- =========================
         MODAL MENSAJE LOGIN
    ========================== -->


    <div

            id="modalLoginMensaje"

            class="modal"

            style="display:none;">





        <div class="modal-contenido modal-mensaje">





            <h2 id="tituloLoginMensaje">


            </h2>






            <p id="textoLoginMensaje">


            </p>








            <div class="acciones-modal">





                <button

                        id="btnAceptarLogin"

                        class="boton-principal">


                    Aceptar


                </button>





            </div>







        </div>





    </div>






</section>






<script

        type="module"

        src="js/login.js">


</script>


</body>


</html>
