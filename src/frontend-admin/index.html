<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MenuInteractivo Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>MenuInteractivo - Administración</h1>

<section>

    <h2>Menús</h2>

    <input
            type="text"
            id="descripcionMenu"
            placeholder="Descripción del menú"
    >


    <button id="btnCrearMenu">
        Crear Menú
    </button>

    <button id="btnGuardarMenu">
        Guardar Menú
    </button>

    <hr>

    <ul id="listaMenus"></ul>

    <p id="menuSeleccionadoTexto" class="oculto">
        Menú seleccionado:
        <strong id="nombreMenuSeleccionado"></strong>
    </p>
    <hr>

    <div id="seccionFichas" class="oculto"></div>

    <h2>Fichas</h2>

    <input
            type="text"
            id="buscadorFichas"
            placeholder="Buscar ficha por título, resumen o texto"
    >

    <ul id="listaFichas"></ul>

    <hr>

    <h3 id="tituloFormularioFicha">Crear Nueva Ficha (Selecciona un menú primero)</h3>
    <p id="estadoFormularioFicha" class="estado-formulario-ficha">Modo creación</p>
    <div style="margin-top: 15px;">
        <input type="text" id="tituloFicha" placeholder="Título de la ficha" style="display:block; margin-bottom:10px; width:300px;">
        <input type="text" id="resumenFicha" placeholder="Resumen de la ficha" style="display:block; margin-bottom:10px; width:300px;">
        <input type="text" id="imagenFicha" placeholder="URL o ruta de imagen" style="display:block; margin-bottom:10px; width:300px;">
        <input type="file" id="archivoImagenFicha" accept="image/*" style="display:block; margin-bottom:10px; width:300px;">
        <textarea id="textoFicha" placeholder="Texto completo de la ficha" style="display:block; margin-bottom:10px; width:300px; height:80px;"></textarea>

        <button id="btnCrearFicha">
            Crear Ficha
        </button>

        <button id="btnGuardarCambios">
            Guardar Cambios
        </button>

        <button id="btnCancelarEdicion" class="boton-secundario oculto">
            Cancelar edición
        </button>

    </div>

</section>

</div>

<div id="modalVistaPrevia" class="modal-oculto">
    <div class="modal-contenido">
        <button id="btnCerrarVistaPrevia" class="boton-cerrar">Cerrar</button>
        <span id="vistaPreviaEstado"></span>
        <h2 id="vistaPreviaTitulo"></h2>
        <img id="vistaPreviaImagen" alt="Imagen de la ficha">
        <p id="vistaPreviaResumen"></p>
        <div id="vistaPreviaTexto"></div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
