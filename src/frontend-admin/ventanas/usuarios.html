<section class="ventana ventana-usuarios">


    <!-- ==========================
         ENCABEZADO
    =========================== -->

    <div class="encabezado-usuarios">

        <div>

            <h2 class="titulo-usuarios">
                Gestión de Usuarios
            </h2>

            <p class="subtitulo-usuarios">
                Administración de usuarios y permisos del sistema
            </p>

        </div>


        <button
                class="btn-nuevo-usuario"
                onclick="abrirModalUsuarioUsuarios()"
        >

            + Nuevo Usuario

        </button>


    </div>




    <!-- ==========================
         TABLA USUARIOS
    =========================== -->


    <div class="contenedor-tabla-usuarios">


        <table class="tabla-usuarios">


            <thead>

            <tr>

                <th>
                    Nombre
                </th>


                <th>
                    Email
                </th>


                <th>
                    Rol
                </th>


                <th>
                    Estado
                </th>


                <th>
                    Acciones
                </th>

            </tr>


            </thead>



            <tbody id="tablaUsuarios">

            </tbody>



        </table>


    </div>



</section>







<!-- ==========================
     MODAL USUARIO
=========================== -->


<div
        id="modalUsuarioUsuarios"
        class="modal-usuarios"
        style="display:none;"
>


    <div class="contenido-modal-usuarios">


        <h2 id="tituloModalUsuarioUsuarios">
            Nuevo Usuario
        </h2>



        <!-- NOMBRE -->

        <label>
            Nombre
        </label>

        <input
                id="nombreUsuarioNuevo"
                type="text"
                placeholder="Nombre completo"
        >




        <!-- EMAIL -->

        <label>
            Email
        </label>

        <input
                id="emailUsuarioNuevo"
                type="email"
                placeholder="correo@ejemplo.com"
        >




        <!-- PASSWORD -->

        <div id="contenedorPassword">


            <label>
                Contraseña
            </label>


            <input
                    id="passwordUsuarioNuevo"
                    type="password"
                    placeholder="Contraseña"
            >


        </div>





        <!-- ROL -->

        <label>
            Rol
        </label>


        <select id="rolUsuarioNuevo">


            <option value="admin">
                Administrador
            </option>


            <option value="editor">
                Editor
            </option>


            <option value="consulta">
                Consulta
            </option>


        </select>






        <!-- ACTIVO -->


        <label>

            <input
                    type="checkbox"
                    id="activoUsuarioNuevo"
                    checked
            >

            Usuario activo

        </label>







        <div class="acciones-modal-usuarios">



            <button
                    onclick="cerrarModalUsuarioUsuarios()"
            >

                Cancelar

            </button>





            <button
                    onclick="guardarUsuarioUsuarios()"
                    class="btn-nuevo-usuario"
            >

                Guardar

            </button>



        </div>



    </div>



</div>







<!-- ==========================
     MODAL CAMBIO PASSWORD
=========================== -->


<div
        id="modalPasswordUsuarios"
        class="modal-usuarios"
        style="display:none;"
>


    <div class="contenido-modal-usuarios">


        <h2>
            Cambiar contraseña
        </h2>



        <label>
            Nueva contraseña
        </label>


        <input
                id="nuevaPassword"
                type="password"
                placeholder="Nueva contraseña"
        >




        <div class="acciones-modal-usuarios">


            <button
                    onclick="cerrarModalPasswordUsuarios()"
            >

                Cancelar

            </button>



            <button
                    onclick="guardarPasswordUsuarios()"
                    class="btn-nuevo-usuario"
            >

                Guardar

            </button>

        </div>

    </div>

</div>



<!-- ==========================
     MODAL MENSAJES
=========================== -->

<div
        id="modalMensajeUsuarios"
        class="modal-usuarios"
        style="display:none;"
>

    <div class="contenido-modal-mensaje-usuarios">

        <h2 id="tituloMensajeUsuarios"></h2>

        <p id="textoMensajeUsuarios"></p>

        <div class="acciones-modal-usuarios">

            <button
                    id="btnAceptarMensajeUsuarios"
                    class="btn-nuevo-usuario">

                Aceptar

            </button>

        </div>

    </div>

</div>



<!-- ==========================
     MODAL CONFIRMAR ELIMINACIÓN
=========================== -->

<div
        id="modalEliminarUsuarios"
        class="modal-usuarios"
        style="display:none;"
>

    <div class="contenido-modal-eliminar-usuarios">

        <h2>
            Confirmar eliminación
        </h2>

        <p id="textoEliminarUsuarios"></p>

        <div class="acciones-modal-usuarios">

            <button
                    id="btnCancelarEliminarUsuarios">

                Cancelar

            </button>

            <button
                    id="btnConfirmarEliminarUsuarios"
                    class="btn-nuevo-usuario">

                Eliminar

            </button>

        </div>

    </div>

</div>
