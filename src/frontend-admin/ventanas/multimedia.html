<section class="ventana ventana-multimedia">

    <div class="cabecera-multimedia-panel">

        <button
                id="barraVolverFicha"
                class="btn-ver btn-volver"
                onclick="volverFicha()"
                style="display:none;">

            ← Volver a fichas

        </button>

        <div>

            <h2 id="tituloMultimedia">
                Gestión de Multimedia
            </h2>

            <p id="subtituloMultimedia"></p>

        </div>

    </div>


    <button
            id="nuevoMultimedia"
            class="btn-nuevo-multimedia"
            onclick="nuevoMultimedia()">

        + Nuevo archivo

    </button>



    <!-- =======================================
         PANEL CUANDO VIENE DESDE UNA FICHA
    ======================================== -->

    <div
            id="panelFichaMultimedia"
            class="panel-ficha-multimedia-contenedor"
            style="display:none;">

        <!-- Tarjeta de la ficha -->

        <div
                id="tarjetaFichaMultimedia"
                class="tarjeta-resumen-multimedia">

        </div>


        <!-- Multimedia asociada -->

        <div class="contenedor-listado-multimedia">

            <h3>Multimedia asociada</h3>

            <div
                    id="listaMultimedia"
                    class="grid-multimedia">
            </div>

        </div>

    </div>



    <!-- =======================================
         VISTA GENERAL
    ======================================== -->

    <div id="vistaGeneralMultimedia">

        <div
                id="listaMultimediaGeneral"
                class="grid-multimedia">
        </div>

    </div>



    <!-- =======================================
     MODAL VISTA PREVIA MULTIMEDIA
======================================== -->

    <div
            id="modalVistaMultimedia"
            class="modal-multimedia">

        <div class="contenido-modal-multimedia vista-modal">


            <button
                    class="cerrar-multimedia"
                    onclick="cerrarVistaMultimedia()">

                ✖

            </button>


            <div class="cabecera-vista-multimedia">

                <h2>
                    🎞 Vista previa multimedia
                </h2>

                <p>
                    Información detallada del archivo
                </p>

            </div>



            <div id="contenidoVistaMultimedia">

            </div>


        </div>

    </div>


    <!-- =======================================
         NUEVO MULTIMEDIA
    ======================================== -->

    <div
            id="modalMultimediaNuevo"
            class="modal-multimedia">

        <div class="contenido-modal-multimedia">

            <button
                    class="cerrar-multimedia"
                    onclick="cerrarNuevoMultimedia()">

                ✖

            </button>

            <h3>
                Nuevo archivo
            </h3>

            <label>Ficha</label>

            <select id="multiFicha"></select>

            <label>Descripción</label>

            <input
                    type="text"
                    id="multiDescripcion"
                    placeholder="Descripción del archivo">

            <label>Tipo</label>

            <select id="multiTipo">

                <option value="imagen">Imagen</option>

                <option value="video">Video</option>

                <option value="audio">Audio</option>

                <option value="pdf">PDF</option>

            </select>

            <label>Archivo</label>

            <input
                    type="file"
                    id="multiArchivo">

            <div id="previewArchivoActual" class="preview-archivo-actual" style="display:none;">

                <h4>Archivo actual</h4>

                <div id="contenidoPreviewArchivo"></div>

            </div>


            <label class="checkbox-label">

                <input
                        type="checkbox"
                        id="multiActivo"
                        checked>

                Activo

            </label>

            <div class="acciones-modal-multimedia">

                <button onclick="guardarMultimedia()">
                    Guardar
                </button>

                <button onclick="cerrarNuevoMultimedia()">
                    Cancelar
                </button>

            </div>

        </div>

    </div>



    <!-- =======================================
         ELIMINAR MULTIMEDIA
    ======================================== -->

    <div
            id="modalEliminarMultimedia"
            class="modal-multimedia">

        <div class="contenido-modal-multimedia">

            <button
                    class="cerrar-multimedia"
                    onclick="cerrarEliminarMultimedia()">

                ✖

            </button>

            <h3>
                Eliminar multimedia
            </h3>

            <p>
                ¿Desea eliminar este archivo multimedia?
            </p>

            <div class="acciones-modal-multimedia">

                <button
                        class="btn-eliminar-multimedia"
                        onclick="confirmarEliminarMultimedia()">

                    Eliminar

                </button>

                <button
                        class="btn-ver-multimedia"
                        onclick="cerrarEliminarMultimedia()">

                    Cancelar

                </button>

            </div>

        </div>

    </div>


    <!-- =======================================
     MENSAJES
======================================= -->

    <div
            id="modalMensaje"
            class="modal-multimedia">

        <div class="contenido-modal-multimedia">

            <div class="encabezado-modal">

                <h3 id="tituloMensaje">
                    Mensaje
                </h3>

                <button
                        class="cerrar-modal"
                        onclick="cerrarMensaje()">

                    ✕

                </button>

            </div>

            <p
                    id="textoMensaje"
                    class="mensaje-confirmacion">
            </p>

            <div class="acciones-modal-multimedia">

                <button
                        class="btn-ver-multimedia"
                        onclick="cerrarMensaje()">

                    Aceptar

                </button>

            </div>

        </div>

    </div>



    <!-- =======================================
     VISOR COMPLETO PDF
======================================= -->

    <div
            id="modalDocumentoCompleto"
            class="modal-multimedia">

        <div class="contenido-modal-multimedia documento-completo-multimedia">

            <button
                    class="cerrar-multimedia"
                    onclick="cerrarDocumentoCompleto()">

                ✖

            </button>

            <h2>
                Documento completo
            </h2>

            <iframe
                    id="visorDocumentoCompleto"
                    class="visor-documento-completo">
            </iframe>

        </div>

    </div>

</section>
