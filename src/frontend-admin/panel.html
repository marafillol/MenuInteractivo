<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Panel Administrativo | MenuInteractivo</title>


    <link rel="stylesheet" href="css/panel.css">
    <link rel="stylesheet" href="css/sidebar.css">


    <link rel="stylesheet" href="css/menus.css">
    <link rel="stylesheet" href="css/fichas.css">
    <link rel="stylesheet" href="css/multimedia.css">
    <link rel="stylesheet" href="css/plantillas.css">
    <link rel="stylesheet" href="css/usuarios.css">
    <link rel="stylesheet" href="css/etiquetas.css">
    <link rel="stylesheet" href="css/dashboard.css">


    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">


</head>


<body>


<div class="panel-admin">


    <!-- ================= SIDEBAR ================= -->

    <aside class="sidebar">


        <div class="logo">

            <h2>MENU</h2>

            <span>INTERACTIVO</span>

        </div>



        <div class="separador"></div>



        <nav>


            <button class="item activo" data-ventana="dashboard">

                <span>📊</span>
                Dashboard

            </button>


            <button class="item" data-ventana="menus">

                <span>📂</span>
                Menús

            </button>


            <button class="item" data-ventana="fichas">

                <span>📄</span>
                Fichas

            </button>


            <button class="item" data-ventana="multimedia">

                <span>🖼️</span>
                Multimedia

            </button>



            <button class="item" data-ventana="etiquetas">

                <span>🏷️</span>
                Etiquetas

            </button>



            <button id="menuPlantillas"
                    class="item"
                    data-ventana="plantillas">

                <span>📑</span>
                Plantillas

            </button>



            <button id="menuUsuarios"
                    class="item"
                    data-ventana="usuarios">

                <span>👤</span>
                Usuarios

            </button>



            <button id="menuConfiguracion"
                    class="item"
                    data-ventana="configuracion">

                <span>⚙️</span>
                Configuración

            </button>



        </nav>



        <div class="sidebar-footer">

            <button
                    id="cerrarSesion"
                    onclick="abrirModalCerrarSesion()"
            >

                🚪 Cerrar sesión

            </button>

        </div>


    </aside>




    <!-- ================= CONTENIDO ================= -->


    <main class="panel-main">



        <header class="barra-superior">


            <div class="titulo-panel">


                <h1 id="tituloVentana">

                    Dashboard

                </h1>


                <span class="subtitulo">

Centro de Documentación Histórica

</span>


            </div>



            <div class="usuario">


                <div class="usuario-info">


                    <strong id="nombreUsuario">

                        Usuario

                    </strong>


                    <small id="fechaActual">

                    </small>


                </div>



                <div class="avatar">

                    👤

                </div>


            </div>


        </header>




        <section id="contenido">


        </section>



    </main>


</div>


<!-- ==========================
     MODAL CERRAR SESIÓN
=========================== -->


<div
        id="modalCerrarSesion"
        class="modal-cerrar-sesion"
        style="display:none;"
>

    <div class="modal-cerrar-contenido">


        <h2>
            Cerrar sesión
        </h2>



        <p>
            ¿Está seguro que desea cerrar la sesión?
            <br><br>
            Tendrá que ingresar nuevamente sus credenciales
            para acceder al panel administrativo.
        </p>



        <div class="acciones-modal">


            <button
                    onclick="cerrarModalCerrarSesion()"
            >

                Cancelar

            </button>



            <button
                    class="boton-principal"
                    onclick="confirmarCerrarSesion()"
            >

                Cerrar sesión

            </button>


        </div>


    </div>


</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/authFirebase.js"></script>

<script src="js/apiFirebase.js"></script>
<script src="js/permisos.js"></script>
<script src="js/panel.js"></script>


</body>

</html>
