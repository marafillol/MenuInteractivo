<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Museo Malvinas</title>

    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/bienvenida.css">
    <link rel="stylesheet" href="css/explorador.css">
    <link rel="stylesheet" href="css/ficha.css">
    <link rel="stylesheet" href="css/vistaPrevia.css">
    <link rel="stylesheet" href="css/historiaCompleta.css">


</head>

<body>

<div id="app"></div>

<script src="js/api.js"></script>
<script src="js/bienvenida.js"></script>
<script src="js/explorador.js"></script>
<script src="js/fichas.js"></script>
<script src="js/vistaPrevia.js"></script>
<script src="js/historiaCompleta.js"></script>
<script src="js/app.js"></script>


<div id="modalHistoriaCompleta" class="modalHistoria">

    <div class="contenidoHistoria">


        <button
                id="cerrarHistoria"
                class="cerrarHistoria">

            ✖

        </button>


        <div id="contenidoHistoriaCompleta">

        </div>


    </div>

</div>


<div id="visorImagen" class="visorImagen">


    <button
            onclick="cerrarImagenMultimedia()">

        ✖

    </button>


    <img
            id="imagenAmpliada">


</div>

<div id="visorVideo" class="visorImagen">


    <button
            onclick="cerrarVideoMultimedia()">

        ✖

    </button>


    <video
            id="videoAmpliado"
            controls>

    </video>


</div>


<div id="visorDocumento" class="visorImagen">


    <button
            onclick="cerrarDocumentoMultimedia()">

        ✖

    </button>


    <iframe
            id="documentoAmpliado">

    </iframe>


</div>


<div id="visorAudio" class="visorImagen">


    <button
            onclick="cerrarAudioMultimedia()">

        ✖

    </button>


    <audio
            id="audioAmpliado"
            controls>

    </audio>


</div>

</body>

</html>
